<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>Yoklama</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans:wght@300;400;600&display=swap');

:root {
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2230;--border:#2a3347;
  --accent:#00d4aa;--accent2:#0099ff;--text:#e6edf3;--muted:#7d8fa8;
  --present:#00d4aa;--absent:#ff4d6d;--izin:#a78bfa;--rapor:#fb923c;--gec:#facc15;--evci:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;overscroll-behavior:none;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}

/* LOGIN */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:28px;}
.login-logo{font-size:52px;}
.login-title{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:var(--accent);letter-spacing:2px;text-align:center;}
.login-sub{font-size:12px;color:var(--muted);text-align:center;margin-top:-20px;}
.login-btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;}
.login-btn{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;cursor:pointer;letter-spacing:1px;transition:opacity 0.15s;}
.login-btn:active{opacity:0.8;}
.btn-nobetci{background:var(--accent);color:#000;}
.btn-admin{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}

/* KAT */
.kat-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px;}
.kat-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--text);}
.kat-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;}
.kat-btn{width:100%;padding:18px;border:2px solid var(--border);border-radius:14px;background:var(--surface);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px;}
.kat-btn:active{transform:scale(0.97);}
.kat-btn:hover{border-color:var(--accent);}
.kat-icon{font-size:30px;}
.kat-info strong{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--accent);display:block;}
.kat-info span{font-size:11px;color:var(--muted);}
.back-btn{background:none;border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:8px 20px;font-family:'Noto Sans',sans-serif;font-size:12px;cursor:pointer;margin-top:6px;}

/* ADMIN PIN */
.admin-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:18px;}
.admin-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);}
.pin-input{width:100%;max-width:260px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:20px;font-family:'Noto Sans',sans-serif;outline:none;text-align:center;letter-spacing:6px;transition:border-color 0.2s;}
.pin-input:focus{border-color:var(--accent);}
.pin-submit{width:100%;max-width:260px;background:var(--accent);color:#000;border:none;border-radius:12px;padding:13px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;cursor:pointer;}
.pin-error{color:var(--absent);font-size:12px;font-weight:600;}

/* HEADER */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;flex-direction:column;gap:8px;padding-top:calc(10px + env(safe-area-inset-top));}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.header-left{display:flex;align-items:center;gap:8px;}
.app-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;}
.floor-badge{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;padding:3px 9px;border-radius:5px;}
.admin-badge{background:rgba(167,139,250,0.2);border:1px solid var(--izin);color:var(--izin);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;padding:3px 7px;border-radius:5px;}
.date-badge{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:4px 9px;font-size:11px;color:var(--muted);font-weight:600;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:10px;padding:4px 9px;cursor:pointer;font-family:'Noto Sans',sans-serif;}
.time-selector{display:flex;gap:5px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.time-selector::-webkit-scrollbar{display:none;}
.time-btn{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:4px 12px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.18s;font-family:'Noto Sans',sans-serif;white-space:nowrap;}
.time-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}

/* STATS */
.stats-bar{display:flex;gap:5px;padding:7px 12px;background:var(--surface);border-bottom:1px solid var(--border);}
.stat{flex:1;background:var(--surface2);border-radius:9px;padding:6px 3px;text-align:center;border:1px solid var(--border);}
.stat-num{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;line-height:1;}
.stat-label{font-size:9px;color:var(--muted);margin-top:1px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
.s-total .stat-num{color:var(--accent2);}.s-present .stat-num{color:var(--present);}.s-absent .stat-num{color:var(--absent);}.s-coded .stat-num{color:var(--izin);}
.progress-text{text-align:center;font-size:10px;color:var(--muted);font-weight:600;padding:4px 14px 2px;}
.progress-bar-container{height:3px;background:var(--border);margin:0 14px 5px;border-radius:2px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.35s ease;}

/* FILTER */
.filter-bar{padding:6px 12px;display:flex;gap:6px;}
.search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 11px;color:var(--text);font-size:13px;font-family:'Noto Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 7px;color:var(--text);font-size:11px;font-family:'Noto Sans',sans-serif;outline:none;cursor:pointer;}

/* CONTENT */
.content{padding:0 0 88px;}
.room-header{display:flex;align-items:center;gap:8px;padding:8px 12px 4px;margin-top:4px;}
.room-badge{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;padding:2px 9px;border-radius:5px;letter-spacing:0.5px;}
.room-divider{flex:1;height:1px;background:var(--border);}
.room-count{font-size:10px;color:var(--muted);font-weight:600;}

/* STUDENT ROW */
.student-row{display:flex;align-items:center;margin:2px 9px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:9px 11px;gap:9px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none;}
.student-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border);transition:background 0.2s;}
.student-row.st-present::before{background:var(--present);}
.student-row.st-present{background:rgba(0,212,170,0.04);}
.student-row.st-izin::before{background:var(--izin);}
.student-row.st-rapor::before{background:var(--rapor);}
.student-row.st-gec::before{background:var(--gec);}
.student-row.st-evci::before{background:var(--evci);}
.student-row.st-locked::before{background:var(--muted);}
.student-row:active{transform:scale(0.98);}
.student-info{flex:1;min-width:0;}
.student-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.student-meta{font-size:10px;color:var(--muted);margin-top:1px;font-weight:600;}
.status-area{display:flex;align-items:center;gap:4px;flex-shrink:0;}

/* TICK */
.tick-btn{width:34px;height:34px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;font-size:0;color:#000;font-weight:900;}
.tick-btn:active{transform:scale(0.88);}
.tick-btn.ticked{background:var(--present);border-color:var(--present);font-size:17px;box-shadow:0 0 10px rgba(0,212,170,0.35);}
.tick-btn.ticked::after{content:'✓';}
.tick-btn.locked{cursor:not-allowed;}
.tick-btn.code-i{background:rgba(167,139,250,0.15);border-color:var(--izin);font-size:15px;font-family:'Rajdhani',sans-serif;color:var(--izin);box-shadow:0 0 8px rgba(167,139,250,0.3);}
.tick-btn.code-r{background:rgba(251,146,60,0.15);border-color:var(--rapor);font-size:15px;font-family:'Rajdhani',sans-serif;color:var(--rapor);box-shadow:0 0 8px rgba(251,146,60,0.3);}
.tick-btn.code-g{background:rgba(250,204,21,0.15);border-color:var(--gec);font-size:15px;font-family:'Rajdhani',sans-serif;color:var(--gec);box-shadow:0 0 8px rgba(250,204,21,0.3);}
.tick-btn.code-e{background:rgba(96,165,250,0.15);border-color:var(--evci);font-size:15px;font-family:'Rajdhani',sans-serif;color:var(--evci);box-shadow:0 0 8px rgba(96,165,250,0.3);}

/* CODE BTNS */
.code-btns{display:flex;gap:3px;}
.code-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--muted);transition:all 0.15s;flex-shrink:0;}
.code-btn:active{transform:scale(0.88);}
.code-btn.active-i{background:rgba(167,139,250,0.2);border-color:var(--izin);color:var(--izin);}
.code-btn.active-r{background:rgba(251,146,60,0.2);border-color:var(--rapor);color:var(--rapor);}
.code-btn.active-g{background:rgba(250,204,21,0.2);border-color:var(--gec);color:var(--gec);}
.code-btn.active-e{background:rgba(96,165,250,0.2);border-color:var(--evci);color:var(--evci);}
.code-btn.locked-btn{opacity:0.35;cursor:not-allowed;}

.status-pill{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;padding:3px 7px;border-radius:5px;min-width:24px;text-align:center;}
.pill-i{background:rgba(167,139,250,0.2);color:var(--izin);}
.pill-r{background:rgba(251,146,60,0.2);color:var(--rapor);}
.pill-g{background:rgba(250,204,21,0.2);color:var(--gec);}
.pill-e{background:rgba(96,165,250,0.2);color:var(--evci);}
.lock-icon{font-size:13px;color:var(--muted);opacity:0.5;}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:9px 11px;padding-bottom:calc(9px + env(safe-area-inset-bottom));display:flex;gap:6px;}
.btn{border:none;border-radius:10px;padding:11px 10px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:opacity 0.15s;white-space:nowrap;}
.btn:active{opacity:0.75;}
.btn-green{background:var(--accent);color:#000;flex:1;}
.btn-blue{background:var(--accent2);color:#fff;}
.btn-purple{background:rgba(167,139,250,0.2);border:1px solid var(--izin);color:var(--izin);}
.btn-danger{background:rgba(255,77,109,0.15);border:1px solid var(--absent);color:var(--absent);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;align-items:flex-end;animation:fadeIn 0.2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 0 40px;animation:slideUp 0.28s cubic-bezier(.2,.8,.3,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 0;}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;padding:11px 14px 5px;display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--muted);padding:3px 11px;font-size:15px;cursor:pointer;}
.vakit-tabs{display:flex;gap:4px;padding:7px 11px 0;overflow-x:auto;scrollbar-width:none;}
.vakit-tabs::-webkit-scrollbar{display:none;}
.vakit-tab{flex-shrink:0;padding:3px 10px;border-radius:16px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans',sans-serif;transition:all 0.15s;white-space:nowrap;}
.vakit-tab.active{background:var(--absent);border-color:var(--absent);color:#fff;}
.report-section{margin:9px 11px 0;border-radius:9px;overflow:hidden;border:1px solid var(--border);}
.report-section-header{padding:7px 11px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:space-between;}
.rsh-absent{background:rgba(255,77,109,0.15);color:var(--absent);}
.rsh-present{background:rgba(0,212,170,0.12);color:var(--present);}
.rsh-coded{background:rgba(167,139,250,0.15);color:var(--izin);}
.report-row{display:flex;align-items:center;padding:7px 11px;border-top:1px solid var(--border);background:var(--surface2);font-size:12px;font-weight:600;gap:7px;}
.rr-code{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;padding:2px 5px;border-radius:4px;}
.rr-meta{font-size:10px;color:var(--muted);margin-left:auto;}
.report-empty{padding:9px;text-align:center;color:var(--muted);font-size:11px;background:var(--surface2);border-top:1px solid var(--border);}
.copy-btn{margin:11px;width:calc(100% - 22px);background:linear-gradient(135deg,var(--accent2),#007acc);color:#fff;border:none;border-radius:11px;padding:12px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;}

/* CONFIRM */
.confirm-popup{position:fixed;bottom:74px;left:11px;right:11px;background:var(--surface);border:1.5px solid var(--absent);border-radius:14px;padding:13px;z-index:400;display:flex;flex-direction:column;gap:9px;box-shadow:0 -4px 30px rgba(255,77,109,0.2);}
.confirm-popup.hidden{display:none;}
.cp-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--absent);}
.cp-sub{font-size:11px;color:var(--muted);margin-top:-4px;}
.cp-btns{display:flex;gap:6px;}
.cp-y,.cp-a,.cp-n{flex:1;border-radius:7px;padding:8px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.cp-y{background:var(--absent);color:#fff;border:none;}
.cp-a{background:rgba(255,77,109,0.12);color:var(--absent);border:1px solid var(--absent);}
.cp-n{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}

/* TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--accent);color:#000;padding:7px 16px;border-radius:24px;font-weight:700;font-size:12px;font-family:'Rajdhani',sans-serif;opacity:0;transition:all 0.22s;pointer-events:none;white-space:nowrap;letter-spacing:0.5px;z-index:600;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.hidden{display:none!important;}

/* ═══════════════════════════════
   PRINT / HAFTALIK ÇIKTISI
   Yatay A4 - Tek sayfa, Pzt→Paz
   ═══════════════════════════════ */
#printArea{display:none;}

@media print {
  @page { size: A4 portrait; margin: 5mm; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body > *:not(#printArea) { display: none !important; }
  #printArea {
    display: block !important;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 5.5px;
    color: #000;
    background: white;
    width: 200mm;
  }
  .pt-page { page-break-after: always; }
  .pt-page:last-child { page-break-after: avoid; }

  /* HEADER */
  .pt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; border-bottom: 1.5px solid #000; padding-bottom: 2px; }
  .pt-title-main { font-size: 9px; font-weight: bold; }
  .pt-title-sub  { font-size: 6px; color: #444; }
  .pt-week-range { font-size: 7px; font-weight: bold; text-align: right; }

  /* ANA TABLO */
  .pt-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .pt-table th, .pt-table td {
    border: 0.4px solid #999;
    text-align: center;
    vertical-align: middle;
    padding: 0;
    overflow: hidden;
    white-space: nowrap;
  }
  .pt-table th { background: #e8e8e8; font-weight: bold; font-size: 5px; line-height: 1.2; }
  .pt-table td { font-size: 6px; height: 11px; line-height: 11px; }

  /* sabit sütunlar - dikey A4'e sığsın diye dar */
  .col-oda   { width: 14px; }
  .col-sinif { width: 12px; }
  .col-isim  { width: 62px; text-align: left !important; padding-left: 2px !important; }
  .col-etut  { width: 11px; }

  /* gün grup başlığı */
  .th-day   { background: #cccccc !important; font-size: 6px !important; font-weight: bold !important; line-height: 1.3; }
  .th-vakit { background: #efefef !important; font-size: 4.5px !important; }

  /* oda dikey */
  .td-oda  { writing-mode: vertical-rl; transform: rotate(180deg); font-size: 5.5px; font-weight: bold; background: #f5f5f5; }
  .td-isim { text-align: left !important; padding-left: 2px !important; font-size: 6px; }

  /* hücre sembolleri */
  .cv-ok { font-weight: bold; font-size: 8px; }
  .cv-mt { color: #bbb; }
  .cv-i  { color: #5b21b6; font-weight: bold; font-size: 6px; }
  .cv-r  { color: #c2410c; font-weight: bold; font-size: 6px; }
  .cv-g  { color: #92400e; font-weight: bold; font-size: 6px; }
  .cv-e  { color: #1e40af; font-weight: bold; font-size: 6px; }

  /* günler arası kalın ayırıcı */
  .day-sep { border-left: 1.2px solid #444 !important; }

  /* İMZA */
  .pt-sign-area { margin-top: 4px; display: flex; justify-content: space-around; border-top: 1px solid #aaa; padding-top: 3px; }
  .pt-sign-box  { text-align: center; }
  .pt-sign-line { border-bottom: 1px solid #000; width: 90px; height: 18px; margin: 0 auto 2px; }
  .pt-sign-label { font-size: 6.5px; font-weight: bold; }
  .pt-sign-sub   { font-size: 5.5px; color: #666; }

  /* LEGEND */
  .pt-legend { margin-top: 2px; font-size: 5.5px; color: #555; display: flex; gap: 6px; flex-wrap: wrap; }
  .pt-legend b { color: #000; }

  .good { color: #155724; font-weight: bold; font-size: 6px; }
  .bad  { color: #721c24; font-weight: bold; font-size: 6px; }
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<body>

<!-- GİRİŞ -->
<div class="screen active" id="screenLogin">
  <div class="login-wrap">
    <div class="login-logo">📋</div>
    <div>
      <div class="login-title">YOKLAMA SİSTEMİ</div>
      <div class="login-sub">Belletmen Takip</div>
    </div>
    <div class="login-btns">
      <button class="login-btn btn-nobetci" onclick="goKatSec()">👮 Nöbetçi Girişi</button>
      <button class="login-btn btn-admin" onclick="goAdmin()">🔐 Admin Girişi</button>
    </div>
  </div>
</div>

<!-- KAT SEÇİM -->
<div class="screen" id="screenKat">
  <div class="kat-wrap">
    <div class="kat-title">Hangi kattasın?</div>
    <div class="kat-btns">

// ── Bin index yönetimi — cloud'dan da çek ──
function loadBinIndex(){ try{ return JSON.parse(localStorage.getItem(BIN_INDEX_KEY)||'{}'); }catch(e){return {};} }
function saveBinIndex(idx){ try{ localStorage.setItem(BIN_INDEX_KEY,JSON.stringify(idx)); }catch(e){} }

// Bin index'i cloud'da da tut (tüm cihazlar paylaşsın)
let cloudIndexBinId = localStorage.getItem('yoklama_index_bin_id') || null;

async function loadCloudIndex(){
  if(cloudIndexBinId){
    try{
      const res = await fetch(BIN_BASE+'/b/'+cloudIndexBinId+'/latest',{
        headers:{'X-Master-Key':BIN_API_KEY},
        cache:'no-store'
      });
      const j = await res.json();
      if(j.record){ 
        const merged = {...loadBinIndex(), ...j.record};
        saveBinIndex(merged);
        return merged;
      }
    }catch(e){}
  }
  return loadBinIndex();
}

async function saveCloudIndex(idx){
  saveBinIndex(idx);
  try{
    if(cloudIndexBinId){
      await fetch(BIN_BASE+'/b/'+cloudIndexBinId,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':BIN_API_KEY,'X-Bin-Versioning':'false'},
        body:JSON.stringify(idx)
      });
    } else {
      const res = await fetch(BIN_BASE+'/b',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Master-Key':BIN_API_KEY,'X-Bin-Name':'yoklama_index','X-Bin-Private':'false'},
        body:JSON.stringify(idx)
      });
      const j = await res.json();
      if(j.metadata?.id){
        cloudIndexBinId = j.metadata.id;
        localStorage.setItem('yoklama_index_bin_id', cloudIndexBinId);
      }
    }
  }catch(e){}
}

// ── JSONBin'e kaydet ──
async function saveToCloud(floor, dateKey, data){
  const key = 'f'+floor+'_'+dateKey;
  const idx = await loadCloudIndex();
  try{
    if(idx[key]){
      // Mevcut bin'i güncelle (PUT)
      await fetch(BIN_BASE+'/b/'+idx[key],{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':BIN_API_KEY,'X-Bin-Versioning':'false'},
        body:JSON.stringify(data)
      });
    } else {
      // Yeni bin oluştur (POST)
      const res = await fetch(BIN_BASE+'/b',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Master-Key':BIN_API_KEY,'X-Bin-Name':key,'X-Bin-Private':'false'},
        body:JSON.stringify(data)
      });
      const j = await res.json();
      if(j.metadata?.id){ idx[key]=j.metadata.id; await saveCloudIndex(idx); }
    }
    // localStorage'a da yaz (yedek)
    localStorage.setItem('yoklama_'+key, JSON.stringify(data));
  }catch(e){
    // İnternet yoksa sadece localStorage'a yaz
    localStorage.setItem('yoklama_'+key, JSON.stringify(data));
    throw e;
  }
}

// ── JSONBin'den oku ──
async function loadFromCloud(floor, dateKey){
  const key = 'f'+floor+'_'+dateKey;
  const idx = await loadCloudIndex();
  if(idx[key]){
    try{
      const res = await fetch(BIN_BASE+'/b/'+idx[key]+'/latest',{
        headers:{'X-Master-Key':BIN_API_KEY},
        cache:'no-store'
      });
      const j = await res.json();
      return j.record || {};
    }catch(e){}
  }
  // Cloud'da yoksa localStorage'a bak
  try{ const s=localStorage.getItem('yoklama_'+key); return s?JSON.parse(s):{}; }catch(e){ return {}; }
}

// ── Ana kaydetme fonksiyonu (debounced) ──
function saveToStorage(){
  if(!currentFloor)return;
  attendanceHistory[currentTime]={...attendance};
  // localStorage'a hemen yaz
  try{ localStorage.setItem('yoklama_f'+currentFloor+'_'+todayKey, JSON.stringify(attendanceHistory)); }catch(e){}
  // Cloud'a 2 saniye debounce ile yaz
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    if(isSaving)return;
    isSaving=true;
    showSync('⏫ Kaydediliyor...','#facc15');
    try{
      await saveToCloud(currentFloor, todayKey, attendanceHistory);
      showSync('✅ Kaydedildi');
      setTimeout(hideSync, 2000);
    }catch(e){
      showSync('⚠️ Offline','#fb923c');
      setTimeout(hideSync, 3000);
    }
    isSaving=false;
  }, 1500);
}

// ── Yükleme fonksiyonu ──
async function loadFromStorage(floor){
  showSync('⏬ Yükleniyor...','#0099ff');
  try{
    const data = await loadFromCloud(floor, todayKey);
    if(data && Object.keys(data).length>0){
      attendanceHistory = data;
      attendance = attendanceHistory[currentTime]
        ? {...attendanceHistory[currentTime]}
        : Object.fromEntries(FLOORS[floor].students.map(s=>[s.id,false]));
    } else {
      attendance = Object.fromEntries(FLOORS[floor].students.map(s=>[s.id,false]));
    }
    showSync('✅ Hazır');
    setTimeout(hideSync, 1500);
  }catch(e){
    // Offline fallback
    try{
      const saved=localStorage.getItem('yoklama_f'+floor+'_'+todayKey);
      if(saved){
        attendanceHistory=JSON.parse(saved);
        attendance=attendanceHistory[currentTime]?{...attendanceHistory[currentTime]}:Object.fromEntries(FLOORS[floor].students.map(s=>[s.id,false]));
      }
    }catch(e2){}
    showSync('⚠️ Offline mod','#fb923c');
    setTimeout(hideSync, 2000);
  }
}

      result[key]={...attendanceHistory};
    } else {
      result[key] = await loadFromCloud(floor, key);

}

// ── STATUS HELPERS ──
function isLocked(id){
  // Admin kodladıysa (string), nöbetçi dokunamasın
  const st=attendance[id];
  return !isAdmin && typeof st==='string';
}

// ── TOGGLE ──
function toggle(id){
  if(isLocked(id)){showToast('🔒 Admin tarafından kodlandı');return;}
  const cur=attendance[id];
  attendance[id]=cur===true?false:true;
  updateRow(id);updateStats();saveToStorage();
}

async function setCode(id,code){
  if(!isAdmin)return;
  const newVal = attendance[id]===code ? false : code;

  // Önce cloud'daki güncel veriyi çek (başka vakit yoklamacı yapmış olabilir)
  showSync('⏫ Kaydediliyor...','#facc15');
  try{
    const cloudData = await loadFromCloud(currentFloor, todayKey);
    if(cloudData && Object.keys(cloudData).length>0){
      // Cloud'dan gelen vakitleri koru, sadece bu id'yi güncelle
      TIMES.forEach(t=>{
        if(!attendanceHistory[t]) attendanceHistory[t] = cloudData[t] || {};
      });
    }
  }catch(e){}

  // Tüm vakitlere kodu uygula
  TIMES.forEach(t=>{
    if(!attendanceHistory[t]) attendanceHistory[t]={};
    attendanceHistory[t][id]=newVal;
  });
  attendance[id]=newVal;

  updateRow(id);updateStats();

  // Hemen cloud'a yaz (debounce yok)
  try{
    await saveToCloud(currentFloor, todayKey, attendanceHistory);
    showSync('✅ Kaydedildi');
    setTimeout(hideSync, 1500);
  }catch(e){
    showSync('⚠️ Offline','#fb923c');
    setTimeout(hideSync,2000);
  }
  try{ localStorage.setItem('yoklama_f'+currentFloor+'_'+todayKey, JSON.stringify(attendanceHistory)); }catch(e){}
}

function updateRow(id){
  const st=attendance[id];
  const row=document.getElementById('row-'+id);
  const tick=document.getElementById('tick-'+id);
  if(!row||!tick)return;
  const locked=isLocked(id);
  let cls='student-row';
  if(st===true)cls+=' st-present';
  else if(st==='İ')cls+=' st-izin';
  else if(st==='R')cls+=' st-rapor';
  else if(st==='E')cls+=' st-evci';
  if(locked)cls+=' st-locked';
  row.className=cls;

  // Tik butonu — kod varsa harf göster
  let tickCls='tick-btn';
  if(st===true){ tickCls+=' ticked'; tick.textContent=''; }
  else if(st==='İ'){ tickCls+=' code-i locked'; tick.textContent='İ'; }
  else if(st==='R'){ tickCls+=' code-r locked'; tick.textContent='R'; }
  else if(st==='E'){ tickCls+=' code-e locked'; tick.textContent='E'; }
  else { tick.textContent=''; }
  tick.className=tickCls;

  // Admin kod butonları
  const CODE_CLS={'İ':'i','R':'r','E':'e'};
  CODES.forEach(c=>{
    const btn=document.getElementById('code-'+c+'-'+id);
    if(btn)btn.className='code-btn'+(st===c?' active-'+CODE_CLS[c]:'')+(locked?' locked-btn':'');
  });
}

async function setTime(t){
  attendanceHistory[currentTime]={...attendance};

  if(attendanceHistory[t]){

// ── STATS ──
function updateStats(){
  const present=students.filter(s=>attendance[s.id]===true).length;
  const coded=students.filter(s=>typeof attendance[s.id]==='string').length;
  const total=students.length;
  const absent=total-present-coded;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statPresent').textContent=present;
  document.getElementById('statAbsent').textContent=absent;
  document.getElementById('statCoded').textContent=coded;
  const pct=Math.round((present+coded)/total*100);
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=`${present} mevcut • ${coded} kodlu • ${absent} yok`;
}

  rooms.forEach(room=>{

    const pres=rs.filter(s=>attendance[s.id]===true).length;
    const cod=rs.filter(s=>typeof attendance[s.id]==='string').length;
    html+=`<div class="room-header"><div class="room-badge">ODA ${room}</div><div class="room-divider"></div><div class="room-count">${pres} mevcut${cod?` • ${cod} kodlu`:''}</div></div>`;
    rs.forEach(s=>{
      const st=attendance[s.id];
      const locked=isLocked(s.id);
      const CODE_CLS={'İ':'i','R':'r','E':'e'};
      let rowCls='student-row';
      if(st===true)rowCls+=' st-present';
      else if(st==='İ')rowCls+=' st-izin';
      else if(st==='R')rowCls+=' st-rapor';
      else if(st==='E')rowCls+=' st-evci';
      if(locked)rowCls+=' st-locked';
      const codeHtml=isAdmin?`<div class="code-btns">${CODES.map(c=>`<button class="code-btn${st===c?' active-'+CODE_CLS[c]:''}" id="code-${c}-${s.id}" onclick="event.stopPropagation();setCode(${s.id},'${c}')">${c}</button>`).join('')}</div>`:'';

      // Tik butonu: kod varsa harf göster, kilitli yap
      let tickCls='tick-btn';
      let tickContent='';
      if(st===true){ tickCls+=' ticked'; }
      else if(st==='İ'){ tickCls+=' code-i locked'; tickContent='İ'; }
      else if(st==='R'){ tickCls+=' code-r locked'; tickContent='R'; }
      else if(st==='E'){ tickCls+=' code-e locked'; tickContent='E'; }

      html+=`<div class="${rowCls}" id="row-${s.id}" onclick="toggle(${s.id})">
        <div class="student-info">
          <div class="student-name">${s.name}</div>
          <div class="student-meta">${s.cls} • Oda ${s.room}</div>
        </div>
        <div class="status-area">${codeHtml}<button class="${tickCls}" id="tick-${s.id}" onclick="event.stopPropagation();toggle(${s.id})">${tickContent}</button></div>
      </div>`;
    });
  });
  list.innerHTML=html;
}

function getWeekDates(){
  const mon=new Date(today);
  const d=today.getDay()===0?6:today.getDay()-1;
  mon.setDate(today.getDate()-d);
  return Array.from({length:7},(_,i)=>{
    const dt=new Date(mon);dt.setDate(mon.getDate()+i);
    return{key:dt.toISOString().slice(0,10),label:DAYS[i],short:dt.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit'})};
  });
}

function getCellValue(allData,dateKey,studentId){
  const dayData=allData[dateKey]||{};
  // Her vakit için bak, önce kod sonra false (yok) sonra true (var)
  let hasTrue=false,hasFalse=false,code=null;
  for(const v of TIMES){
    const vd=dayData[v]||{};
    const st=vd[studentId];
    if(st===undefined)continue;
    if(typeof st==='string'){code=st;break;}
    if(st===true)hasTrue=true;
    if(st===false)hasFalse=true;
  }
  if(code)return code;
  if(hasFalse&&!hasTrue)return 'X';
  if(hasTrue)return '✓';
  return '';
}

function getCellHtml(val){
  if(!val)return`<span class="cv-empty">·</span>`;
  if(val==='✓')return`<span class="cv-ok">+</span>`;
  if(val==='X')return`<span class="cv-x">–</span>`;
  if(val==='İ')return`<span class="cv-i">İ</span>`;
  if(val==='R')return`<span class="cv-r">R</span>`;
  if(val==='G')return`<span class="cv-g">G</span>`;
  if(val==='E')return`<span class="cv-e">E</span>`;
  return val;
}

async function exportExcel() {
  attendanceHistory[currentTime] = {...attendance};
  saveToStorage();
  showSync('⏬ Veriler alınıyor...','#0099ff');

  const wb = XLSX.utils.book_new();
  const weekDates = getWeekDates();
  const weekLabel = weekDates[0].short + ' - ' + weekDates[6].short;
  const VAKITLER = ['Akşam','Etüt','Yatsı','Uyku','Sabah','Telefon'];

  for(const floor of [2, 3]) {
    const floorData = await getAllDataForFloor(floor);
    const floorStudents = FLOORS[floor].students;
    const rooms = [...new Set(floorStudents.map(s => s.room))];

    // ── SATIR 1: Başlık birleştirme için boş bırak, sonra merge edeceğiz
    // ── SATIR 2: Gün isimleri (her gün 5 vakit = 5 sütun)
    // ── SATIR 3: Vakit isimleri
    // Sol sabit: ODA | SNF | ADI VE SOYADI | ETÜT  = 4 sütun

    const FIXED = 4; // sol sabit sütun sayısı
    const VAKIT_COUNT = VAKITLER.length; // 5

    // Başlık satırı 1 - üst başlık
    const hRow1 = ['','','HAFTALIK YOKLAMA ÇİZELGESİ - ' + FLOORS[floor].label + ' (' + weekLabel + ')',''];
    weekDates.forEach(d => { hRow1.push(d.label + '\n' + d.short); for(let i=1;i<VAKIT_COUNT;i++) hRow1.push(''); });
    hRow1.push('DEVAM');

    // Başlık satırı 2 - sütun isimleri
    const hRow2 = ['ODA','SNF','ADI VE SOYADI','ETÜT'];
    weekDates.forEach(() => VAKITLER.forEach(v => hRow2.push(v)));
    hRow2.push('');

    const aoa = [hRow1, hRow2];

    // Veri satırları
    rooms.forEach(room => {
      const rs = floorStudents.filter(s => s.room === room);
      rs.forEach((s, si) => {
        const row = [
          si === 0 ? room : '',
          s.cls,
          s.name,
          s.etut
        ];
        weekDates.forEach(({key}) => {
          const dayData = floorData[key] || {};
          VAKITLER.forEach(vakit => {
            const vd = dayData[vakit] || {};
            const st = vd[s.id];
            if (st === true)        row.push('+');
            else if (st === false)  row.push('–');
            else if (typeof st === 'string') row.push(st);
            else                    row.push('');
          });
        });
        // Devam özeti
        let pCount = 0, tCount = 0;
        weekDates.forEach(({key}) => {
          const v = getCellValue(floorData, key, s.id);
          if (v) { tCount++; if (v !== 'X') pCount++; }
        });
        row.push(pCount + '/' + tCount);
        aoa.push(row);
      });
    });

    // Açıklama satırı
    aoa.push([]);
    aoa.push(['Açıklama:', '+ Mevcut', '– Yok', 'İ İzinli', 'R Rapor', 'G Geç', 'E Evci']);

    // İmza satırları
    aoa.push([]);
    aoa.push(['BELLETMen ÖĞRETMen', '', '', '', '', '', 'BELLETMen ÖĞRETMen', '', '', '', '', '', 'MÜDÜR YARDIMCISI']);
    aoa.push(['Ad Soyad / İmza', '', '', '', '', '', 'Ad Soyad / İmza', '', '', '', '', '', 'Ad Soyad / İmza']);

    const ws = XLSX.utils.aoa_to_sheet(aoa);

    // Sütun genişlikleri
    const colWidths = [
      {wch: 5},  // ODA
      {wch: 5},  // SNF
      {wch: 22}, // İSİM
      {wch: 5},  // ETÜT
    ];
    weekDates.forEach(() => VAKITLER.forEach(() => colWidths.push({wch: 5})));
    colWidths.push({wch: 7}); // DEVAM
    ws['!cols'] = colWidths;

    // Merge: Başlık birleştirme (B1 den sona kadar)
    const totalCols = FIXED + weekDates.length * VAKIT_COUNT + 1;
    ws['!merges'] = ws['!merges'] || [];
    // Başlık metni birleştir (C1 den sona)
    ws['!merges'].push({s:{r:0,c:2}, e:{r:0,c:totalCols-2}});
    // Her gün başlığı 5 sütun birleştir
    weekDates.forEach((d,di) => {
      const startCol = FIXED + di * VAKIT_COUNT;
      ws['!merges'].push({s:{r:0,c:startCol}, e:{r:0,c:startCol+VAKIT_COUNT-1}});
    });

    // Sayfa ayarları - tek sayfaya sığdır
    ws['!pageSetup'] = {
      orientation: 'landscape',
      fitToPage: true,
      fitToWidth: 1,
      fitToHeight: 1,
      paperSize: 9 // A4
    };
    ws['!printOptions'] = { gridLines: true };
    ws['!margins'] = {left:0.3, right:0.3, top:0.5, bottom:0.5, header:0.3, footer:0.3};

    const sheetName = FLOORS[floor].label.replace('.','').replace(' ','_');
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
  }

  const fileName = 'Yoklama_' + weekDates[0].key + '_' + weekDates[6].key + '.xlsx';
  XLSX.writeFile(wb, fileName);
  hideSync();
  showToast('📊 Excel indirildi!');
}

function toASCII(str) {
  return str
    .replace(/Ğ/g,'G').replace(/ğ/g,'g')
    .replace(/Ü/g,'U').replace(/ü/g,'u')
    .replace(/Ş/g,'S').replace(/ş/g,'s')
    .replace(/İ/g,'I').replace(/ı/g,'i')
    .replace(/Ö/g,'O').replace(/ö/g,'o')
    .replace(/Ç/g,'C').replace(/ç/g,'c');
}

// ══════════════════════════════════════
// PDF EXPORT — Dikey A4, tek sayfa
// ══════════════════════════════════════
async function exportPDF() {
  attendanceHistory[currentTime] = {...attendance};
  saveToStorage();
  showSync('⏬ Veriler alınıyor...','#0099ff');
  showToast('⏳ PDF hazırlanıyor...');
  setTimeout(async () => { await _buildPDF(); hideSync(); }, 100);
}

async function _buildPDF() {
  const { jsPDF } = window.jspdf;
  const weekDates = getWeekDates();
  // Vakit isimleri - ASCII only
  const VAKITLER     = ['Aksam','Etut','Yatsi','Uyku','Sabah','Tel'];
  const VAKIT_KEYS   = ['Akşam','Etüt','Yatsı','Uyku','Sabah','Telefon'];
  const DAY_ABBR     = ['Pzt','Sal','Car','Per','Cum','Cmt','Paz'];

  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297;
  const ML = 5, MR = 5, MT = 5;
  const CW = PW - ML - MR; // 200mm

  // Sütun layout
  const W_ODA   = 5,  W_SNF = 5, W_ISIM = 30, W_ETUT = 5;
  const W_DEVAM = 7;
  const W_LEFT  = W_ODA + W_SNF + W_ISIM + W_ETUT;
  const W_VAKIT_TOTAL = CW - W_LEFT - W_DEVAM;
  const VW = W_VAKIT_TOTAL / (7 * 6); // 6 vakit per gün

  const X_ODA   = ML;
  const X_SNF   = X_ODA  + W_ODA;
  const X_ISIM  = X_SNF  + W_SNF;
  const X_ETUT  = X_ISIM + W_ISIM;
  const X_DAYS  = X_ETUT + W_ETUT;
  const X_DEVAM = X_DAYS + W_VAKIT_TOTAL;

  const H_HDR_PAGE = 6;
  const H_HDR_TBL  = 8.5;
  const H_SIGN     = 28;  // daha geniş imza alanı
  const H_USED     = MT + H_HDR_PAGE + H_HDR_TBL + H_SIGN + 1;
  const H_AVAIL    = PH - H_USED;

  for(const [floorIdx, floor] of [[0,2],[1,3]]) {
    if (floorIdx > 0) doc.addPage();

    const floorData    = await getAllDataForFloor(floor);
    const floorStudents= FLOORS[floor].students;
    const rooms        = [...new Set(floorStudents.map(s => s.room))];
    const ROW_H        = H_AVAIL / floorStudents.length; // tam sığacak şekilde
    const weekLabel    = weekDates[0].short + ' - ' + weekDates[6].short;
    const floorLabel   = floor === 2 ? '2. KAT' : '3. KAT';

    let y = MT;

    // ── SAYFA BAŞLIĞI
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(0);
    doc.text('HAFTALIK YOKLAMA - ' + floorLabel, ML, y + 4);
    doc.setFontSize(6); doc.setFont('helvetica','normal');
    doc.text(weekLabel, ML, y + 7.5);
    doc.setFontSize(6);
    doc.text('Yazdirma: ' + today.toLocaleDateString('tr-TR'), PW - MR, y + 5, { align:'right' });
    doc.setDrawColor(0); doc.setLineWidth(0.5);
    doc.line(ML, y + H_HDR_PAGE, ML + CW, y + H_HDR_PAGE);
    y += H_HDR_PAGE + 0.5;

    // ── TABLO BAŞLIK — satır 1: gün isimleri
    const tblTop = y;
    const H_DAY  = 3.5;
    const H_VAK  = H_HDR_TBL - H_DAY;

    // Sol sütun başlıkları (iki satırı birleştir)
    const hdrFills = [
      [X_ODA,  W_ODA],
      [X_SNF,  W_SNF],
      [X_ISIM, W_ISIM],
      [X_ETUT, W_ETUT],
      [X_DEVAM,W_DEVAM],
    ];
    hdrFills.forEach(([x,w]) => {
      doc.setFillColor(210,210,210);
      doc.rect(x, y, w, H_HDR_TBL, 'F');
    });
    doc.setFontSize(5); doc.setFont('helvetica','bold'); doc.setTextColor(0);
    const hMid = y + H_HDR_TBL/2 + 1;
    doc.text('ODA',          X_ODA  + W_ODA/2,   hMid, {align:'center'});
    doc.text('SNF',          X_SNF  + W_SNF/2,   hMid, {align:'center'});
    doc.text('ADI SOYADI',   X_ISIM + W_ISIM/2,  hMid, {align:'center'});
    doc.text('ETUT',         X_ETUT + W_ETUT/2,  hMid, {align:'center'});
    doc.text('DEVAM',        X_DEVAM+ W_DEVAM/2, hMid, {align:'center'});

    // Gün + vakit başlıkları
    weekDates.forEach((d, di) => {
      const gx = X_DAYS + di * 5 * VW;
      const gw = 5 * VW;
      // Gün satırı
      doc.setFillColor(190,190,190);
      doc.rect(gx, y, gw, H_DAY, 'F');
      doc.setFontSize(5); doc.setFont('helvetica','bold'); doc.setTextColor(0);
      doc.text(DAY_ABBR[di] + ' ' + d.short, gx + gw/2, y + H_DAY - 0.8, {align:'center'});
      // Vakit satırı
      VAKITLER.forEach((v, vi) => {
        const vx = gx + vi * VW;
        doc.setFillColor(225,225,225);
        doc.rect(vx, y + H_DAY, VW, H_VAK, 'F');
        doc.setFontSize(3.5); doc.setFont('helvetica','normal'); doc.setTextColor(40);
        doc.text(v, vx + VW/2, y + H_DAY + H_VAK - 1, {align:'center'});
      });
    });

    // Tablo başlık çerçeve
    doc.setDrawColor(80); doc.setLineWidth(0.3);
    doc.rect(ML, y, CW, H_HDR_TBL, 'S');
    y += H_HDR_TBL;

    // ── VERİ SATIRLARI
    let rowY = y;
    rooms.forEach(room => {
      const rs = floorStudents.filter(s => s.room === room);
      rs.forEach((s, si) => {
        const ry = rowY;
        // Satır arka plan
        doc.setFillColor(si % 2 === 0 ? 255 : 250, si % 2 === 0 ? 255 : 250, si % 2 === 0 ? 255 : 250);
        doc.rect(ML, ry, CW, ROW_H, 'F');

        const ty = ry + ROW_H * 0.65; // text y baseline

        // Oda no — sadece ilk satırda, ortada
        if (si === 0) {
          doc.setFontSize(4.8); doc.setFont('helvetica','bold'); doc.setTextColor(0);
          doc.text(room, X_ODA + W_ODA/2, ry + rs.length * ROW_H * 0.65, {align:'center'});
        }

        // Sınıf
        doc.setFontSize(4.5); doc.setFont('helvetica','normal'); doc.setTextColor(50);
        doc.text(s.cls, X_SNF + W_SNF/2, ty, {align:'center'});

        // İsim — Türkçe ASCII
        doc.setFontSize(4.8); doc.setFont('helvetica','normal'); doc.setTextColor(0);
        doc.text(toASCII(s.name), X_ISIM + 1, ty);

        // Etüt
        doc.setFontSize(4.5); doc.setFont('helvetica','normal'); doc.setTextColor(60);
        doc.text(s.etut, X_ETUT + W_ETUT/2, ty, {align:'center'});

        // Yoklama hücreleri
        weekDates.forEach((dd, di) => {
          const dayData = floorData[dd.key] || {};
          VAKIT_KEYS.forEach((vakit, vi) => {
            const vd = dayData[vakit] || {};
            const st = vd[s.id];
            const vx = X_DAYS + (di * 5 + vi) * VW;
            let txt = '', r=0, g=0, b=0, fs=5.5;
            if      (st === true)  { txt='+'; r=0;   g=130; b=0;   fs=6; }
            else if (st === false) { txt='-'; r=180; g=0;   b=0; }
            else if (st === 'İ')  { txt='I'; r=90;  g=0;   b=180; }
            else if (st === 'R')  { txt='R'; r=180; g=60;  b=0; }
            else if (st === 'G')  { txt='G'; r=130; g=90;  b=0; }
            else if (st === 'E')  { txt='E'; r=0;   g=60;  b=180; }
            if (txt) {
              doc.setFontSize(fs); doc.setFont('helvetica','bold'); doc.setTextColor(r,g,b);
              doc.text(txt, vx + VW/2, ty, {align:'center'});
            }
          });
        });

        // Devam
        let pC=0, tC=0;
        weekDates.forEach(({key}) => {
          const v = getCellValue(floorData, key, s.id);
          if (v) { tC++; if (v !== 'X') pC++; }
        });
        const ok = tC === 0 || pC/tC >= 0.8;
        doc.setFontSize(4.8); doc.setFont('helvetica','bold');
        doc.setTextColor(ok ? 0 : 180, ok ? 120 : 0, 0);
        doc.text(pC+'/'+tC, X_DEVAM + W_DEVAM/2, ty, {align:'center'});

        // Yatay çizgi
        doc.setDrawColor(200); doc.setLineWidth(0.08);
        doc.line(ML, ry + ROW_H, ML + CW, ry + ROW_H);
        rowY += ROW_H;
      });
      // Oda ayırıcı
      doc.setDrawColor(140); doc.setLineWidth(0.2);
      doc.line(ML, rowY, ML + CW, rowY);
    });

    // Tablo dış çerçeve
    doc.setDrawColor(0); doc.setLineWidth(0.35);
    doc.rect(ML, tblTop, CW, rowY - tblTop, 'S');

    // Dikey sütun çizgileri
    doc.setDrawColor(160); doc.setLineWidth(0.15);
    [X_SNF, X_ISIM, X_ETUT, X_DAYS, X_DEVAM].forEach(cx => {
      doc.line(cx, tblTop, cx, rowY);
    });
    // Gün ayırıcılar
    weekDates.forEach((_, di) => {
      if (di === 0) return;
      const gx = X_DAYS + di * 5 * VW;
      doc.setDrawColor(100); doc.setLineWidth(0.25);
      doc.line(gx, tblTop, gx, rowY);
    });

    // ── 7 İMZA — her gün sütununun tam altında
    y = rowY;

    // Sol boşluk (ODA+SNF+ISIM+ETUT) için boş alan
    doc.setFillColor(250,250,250);
    doc.rect(ML, y, W_LEFT, H_SIGN, 'F');
    doc.setDrawColor(0); doc.setLineWidth(0.3);
    doc.rect(ML, y, W_LEFT, H_SIGN, 'S');

    // Her gün için imza kutusu — gün sütunuyla tam hizalı
    weekDates.forEach((d, di) => {
      const gx = X_DAYS + di * 5 * VW;
      const gw = 5 * VW;

      // Kutu arka plan
      doc.setFillColor(255,255,255);
      doc.rect(gx, y, gw, H_SIGN, 'F');
      doc.setDrawColor(0); doc.setLineWidth(0.3);
      doc.rect(gx, y, gw, H_SIGN, 'S');

      // İmza çizgisi — kutunun alt 1/3'ünde
      doc.setDrawColor(0); doc.setLineWidth(0.4);
      doc.line(gx + 2, y + H_SIGN - 10, gx + gw - 2, y + H_SIGN - 10);

      // "Belletmen Ogretmen" etiketi
      doc.setFontSize(4.5); doc.setFont('helvetica','bold'); doc.setTextColor(0);
      doc.text('Belletmen Ogretmen', gx + gw/2, y + H_SIGN - 7.5, {align:'center'});

      // "Ad Soyad / Imza"
      doc.setFontSize(3.8); doc.setFont('helvetica','normal'); doc.setTextColor(100);
      doc.text('Ad Soyad / Imza', gx + gw/2, y + H_SIGN - 5.5, {align:'center'});
    });

    // Devam sütunu altı boş kutu
    doc.setFillColor(250,250,250);
    doc.rect(X_DEVAM, y, W_DEVAM, H_SIGN, 'F');
    doc.setDrawColor(0); doc.setLineWidth(0.3);
    doc.rect(X_DEVAM, y, W_DEVAM, H_SIGN, 'S');
  }

  const wd = getWeekDates();
  doc.save('Yoklama_' + wd[0].key + '_' + wd[6].key + '.pdf');
  showToast('PDF indirildi!');
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}
